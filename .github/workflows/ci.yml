name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck -w @clouddesk/worker
      - run: npm run typecheck -w @clouddesk/web
      - run: npm run test -w @clouddesk/worker

  agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/agent/go.sum
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Add MinGW to PATH
        run: Add-Content $env:GITHUB_PATH "C:\msys64\mingw64\bin"
        shell: pwsh
      - run: npm ci
      - run: powershell -ExecutionPolicy Bypass -File apps/agent/build-client.ps1
        working-directory: .
      - run: go test ./...
        working-directory: apps/agent

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, agent]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/agent/go.sum
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Add MinGW to PATH
        run: Add-Content $env:GITHUB_PATH "C:\msys64\mingw64\bin"
        shell: pwsh
      - run: npm ci
      - run: powershell -ExecutionPolicy Bypass -File apps/agent/build-client.ps1
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/agent/clouddesk-client.exe
          generate_release_notes: true
