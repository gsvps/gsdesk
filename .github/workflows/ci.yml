name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck -w @clouddesk/worker
      - run: npm run typecheck -w @clouddesk/web
      - run: npm run test -w @clouddesk/worker

  agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: npm ci
      - run: npm run build -w @clouddesk/web
      - run: powershell -ExecutionPolicy Bypass -File apps/agent/build-client.ps1
        working-directory: .
      - run: go test ./...
        working-directory: apps/agent

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, agent]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: npm ci
      - run: npm run build -w @clouddesk/web
      - run: powershell -ExecutionPolicy Bypass -File apps/agent/build-client.ps1
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/agent/clouddesk-client.exe
          generate_release_notes: true
