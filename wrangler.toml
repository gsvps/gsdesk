# Cloudflare Workers 部署配置（与 VPS apps/server 隔离）
name = "gsdesk"
main = "apps/worker/src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "gsdesk"
migrations_dir = "apps/worker/migrations"

# 一键部署时在配置页将 KV 命名空间名称设为 gsdesk（与 D1 同名，类型不同不冲突）
[[kv_namespaces]]
binding = "KV"

[[r2_buckets]]
binding = "R2"
bucket_name = "gsdesk-files"

[[durable_objects.bindings]]
name = "DEVICE_ROOM"
class_name = "DeviceRoom"

[[durable_objects.bindings]]
name = "SESSION_ROOM"
class_name = "SessionRoom"

[[migrations]]
# Workers Free 须用 SQLite 版 Durable Objects（error 10097）
tag = "v1"
new_sqlite_classes = ["DeviceRoom", "SessionRoom"]

# APP_NAME 不在仓库中预填；部署页留空时应用内默认显示 GSDesk

[assets]
directory = "./apps/web/dist"
binding = "ASSETS"
run_worker_first = true

[vars]
# 手机/浏览器控制端安全入口路径（修改后须 npm run build:web:app 再 deploy）
WEB_APP_PATH = "/app"
CONTROLLER_JWT_SECRET = "gsdesk-dev-controller-secret-change-me"
CLIENT_LATEST_VERSION = "0.1.8"
CLIENT_DOWNLOAD_URL = "https://github.com/gsvps/gsdesk/releases/latest/download/gsdesk-client.exe"

[build]
command = "npm run build:web:app"
