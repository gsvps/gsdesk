name = "gsdesk"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"

[[r2_buckets]]
binding = "R2"

[[durable_objects.bindings]]
name = "DEVICE_ROOM"
class_name = "DeviceRoom"

[[durable_objects.bindings]]
name = "SESSION_ROOM"
class_name = "SessionRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DeviceRoom", "SessionRoom"]

# 本地开发使用此 wrangler.toml；生产部署请使用仓库根目录 wrangler.toml

[vars]
SKIP_SIGNATURE_VERIFY = "true"
CLIENT_LATEST_VERSION = "0.1.8"
CLIENT_DOWNLOAD_URL = "https://github.com/gsvps/gsdesk/releases/latest"
CONTROLLER_JWT_SECRET = "gsdesk-dev-controller-secret-change-me"
