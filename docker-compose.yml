services:
  gsdesk:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      GSDESK_DATA: /data
      CONTROLLER_JWT_SECRET: ${CONTROLLER_JWT_SECRET:-gsdesk-dev-controller-secret-change-me}
      SKIP_SIGNATURE_VERIFY: ${SKIP_SIGNATURE_VERIFY:-false}
    volumes:
      - gsdesk-data:/data
    restart: unless-stopped

volumes:
  gsdesk-data:
